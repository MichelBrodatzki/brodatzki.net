apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-runner
  template:
    metadata:
      labels:
        app: n8n-runner
    spec:
      containers:
        - name: n8n-runner
          image: n8nio/runners:2.17.6
          ports:
            - containerPort: 5680
          env:
            - name: N8N_RUNNERS_TASK_BROKER_URI
              value: "http://n8n:5679"
            - name: N8N_RUNNERS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: secret-n8n-runners
                  key: token
          imagePullPolicy: Always
