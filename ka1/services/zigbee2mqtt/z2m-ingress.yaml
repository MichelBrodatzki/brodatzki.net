apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: z2m-https-gateway
  annotations:
    cert-manager.io/cluster-issuer: "clusterissuer-cloudflare-acme-prod" 
spec:
  gatewayClassName: cilium
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "zigbee.ka1.brodatzki.net"
      tls:
        mode: Terminate
        certificateRefs:
        - kind: Secret
          name: z2m-gateway-tls
      allowedRoutes:
        namespaces:
          from: Same
    - name: http
      protocol: HTTP
      port: 80
      hostname: "zigbee.ka1.brodatzki.net"
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: z2m-http-to-https-redirect
spec:
  parentRefs:
    - name: z2m-https-gateway
      sectionName: http
  hostnames:
    - "zigbee.ka1.brodatzki.net"
  rules:
    - filters:
      - type: RequestRedirect
        requestRedirect:
          scheme: https
          statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: z2m-service-route
spec:
  parentRefs:
    - name: z2m-https-gateway
      sectionName: https
  hostnames:
    - "zigbee.ka1.brodatzki.net"
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - name: z2m
          port: 8080
