apiVersion: v1
kind: ConfigMap
metadata:
  name: homebox-config
  namespace: homebox
data:
  options_allow_registration: "false"
  options_allow_analytics: "false"
  web_max_upload: "10"
  log_level: "info"
  log_format: "text"
  database_driver: "sqlite3"
  database_sqlite_path: "/data/homebox.db?_pragma=busy_timeout=999&_pragma=journal_mode=WAL&_fk=1"
  options_check_github_release: "true"
  label_maker_width: "526"
  label_maker_height: "200"
  label_maker_padding: "32"
  label_maker_font_size: "32.0"