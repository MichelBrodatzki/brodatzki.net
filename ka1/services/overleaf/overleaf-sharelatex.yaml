apiVersion: v1
kind: Service
metadata:
  name: overleaf-sharelatex
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 80
  selector:
    app: overleaf-sharelatex
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: overleaf-sharelatex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: overleaf-sharelatex
  template:
    metadata:
      labels:
        app: overleaf-sharelatex
    spec:
      hostname: overleaf-sharelatex
      enableServiceLinks: false
      containers:
        - name: overleaf-sharelatex
          image: ghcr.io/michelbrodatzki/ka1/sharelatex:main
          ports:
            - containerPort: 80
          volumeMounts:
            - name: sharelatex-data
              mountPath: /var/lib/overleaf
          env:
            - name: OVERLEAF_APP_NAME
              value: "Brodatzki Overleaf"
            - name: OVERLEAF_SITE_URL
              value: https://overleaf.ka1.brodatzki.net
            - name: OVERLEAF_MONGO_URL
              value: "mongodb://overleaf-mongo/sharelatex"
            - name: OVERLEAF_REDIS_HOST
              value: "overleaf-redis"
            - name: REDIS_HOST
              value: "overleaf-redis"
            - name: ENABLED_LINKED_FILE_TYPES
              value: "project_file,project_output_file"
            - name: ENABLE_CONVERSIONS
              value: "true"
            - name: EMAIL_CONFIRMATION_DISABLED
              value: "true"
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
      terminationGracePeriodSeconds: 60
      volumes:
        - name: sharelatex-data
          nfs:
            server: storage1.ka1.brodatzki.network
            path: "/mnt/pool1/appdata/overleaf"
