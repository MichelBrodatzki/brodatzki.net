machine:
  network: 
    hostname: control1
    interfaces:
      - interface: eno1
        dhcp: true
  install:
    disk: /dev/sdb
    image: factory.talos.dev/metal-installer-secureboot/654f89bd9b7cc6fc59b0ef86b9eff3068e73154a09492c1b41800782747c84ce:v1.11.5 
    wipe: true
  nodeLabels:
    topology.kubernetes.io/region: "ka1"
    topology.kubernetes.io/zone: "kube1"
cluster:
  proxy:
    disabled: true
  network:
    cni:
      name: none
  extraManifests:
    - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.4.0/standard-install.yaml
